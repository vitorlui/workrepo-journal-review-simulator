# AI engine / model configuration. Read by worker/agent_orchestrator.py.
# The MVP default is the offline "template" engine: deterministic Markdown
# scaffolding with no API keys. The other providers are seams for later.

default_engine: template

engines:
  template:
    type: offline
    description: >
      Deterministic Markdown scaffolding built from the extracted paper, the
      venue profile and the reviewer profile. No network, no keys. Confidence
      is always reported as NOT_VERIFIED.

  claude:
    type: anthropic_api
    description: Anthropic Claude API (requires ANTHROPIC_API_KEY).
    model_env: ANTHROPIC_MODEL
    default_model: claude-opus-4-8
    api_key_env: ANTHROPIC_API_KEY
    enabled: false

  ollama:
    type: ollama
    description: Local model via Ollama (optional docker-compose service).
    host_env: OLLAMA_HOST
    default_host: http://ollama:11434
    model_env: OLLAMA_MODEL
    default_model: llama3.1
    enabled: false

# CLI engines for the "Execute query" button: a worker runs the local CLI of
# each tool with our generated prompt and captures stdout (no browser, no keys).
# Flags are adjustable here without code changes. pass_via: stdin | arg.
# NOTE: the CLIs must be installed and on PATH wherever the backend runs (native
# host recommended; in Docker they would need to be provisioned in the image).
cli_engines:
  ollama:
    bin: ollama
    cmd: ["ollama", "run", "{model}"]
    model_env: OLLAMA_MODEL
    default_model: llama3.1
    pass_via: stdin
    timeout: 300
  claude:
    bin: claude
    cmd: ["claude", "-p"]      # Claude Code non-interactive print mode
    pass_via: stdin
    timeout: 300
  codex:
    bin: codex
    cmd: ["codex", "exec"]     # OpenAI Codex CLI (ChatGPT) non-interactive
    pass_via: arg
    timeout: 600
  gemini:
    bin: gemini
    cmd: ["gemini", "-p"]      # Google Gemini CLI
    pass_via: arg
    timeout: 600
  # perplexity: intentionally omitted for now (no CLI / tokens exhausted)

# Engines offered by the "Execute query" UI button, in order.
query_engines: [claude, codex, ollama, gemini]

# Comparison runs (scripts/compare_models.py) write to
# data/reviews/<review_id>/reviewer_outputs/model_comparison/
comparison:
  dimensions:
    - severity
    - specificity
    - hallucination_risk
    - usefulness
    - omitted_issues
    - rubric_consistency
    - agreement_with_claude
